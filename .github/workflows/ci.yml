name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Test ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -v

      - name: Report results
        if: always()
        env:
          TEST_OUTCOME: ${{ job.status }}
        run: |
          {
            echo "## Test Results"
            echo "| Check | Result |"
            echo "|-------|--------|"
            if [ "$TEST_OUTCOME" = "success" ]; then
              echo "| pytest | ✅ Passed |"
            else
              echo "| pytest | ❌ Failed |"
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ── Lint ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Ruff
        run: uv run ruff check src/ tests/
      - name: Mypy
        run: uv run mypy src/ --ignore-missing-imports

  # ── Integration ────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group dev
      - name: Integration tests
        run: uv run pytest tests/test_integration_real.py -v -m integration

  # ── Docker Build & Push ───────────────────────────────────────
  docker:
    needs: [test, lint]
    # Build always (verification), push only on main / workflow_dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke test with docker compose
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Use first tag only — metadata action returns multiple lines
          FIRST_TAG=$(echo "$META_TAGS" | head -1)
          # Override image and volume for CI
          cat > docker-compose.ci.yml << YAML
          services:
            mcp-hub:
              image: ${FIRST_TAG}
              volumes:
                - /tmp/mcp-hub-ci-data:/data
          YAML

          mkdir -p /tmp/mcp-hub-ci-data
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

          # Wait for healthy
          for i in $(seq 1 60); do
            if curl -sf http://localhost:26263/admin/api/health | grep -q '"status":"ok"'; then
              echo "✅ Healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "❌ Health check timeout"
              docker compose -f docker-compose.yml -f docker-compose.ci.yml logs
              exit 1
            fi
            sleep 1
          done

          # Verify no ERROR in logs
          if docker compose -f docker-compose.yml -f docker-compose.ci.yml logs 2>&1 | grep -i "ERROR"; then
            echo "❌ ERROR found in logs"
            exit 1
          fi
          echo "✅ No errors in logs"

          docker compose -f docker-compose.yml -f docker-compose.ci.yml down
          rm -rf /tmp/mcp-hub-ci-data
          rm docker-compose.ci.yml

      - name: Report results
        if: always()
        env:
          BUILD_OUTCOME: ${{ job.status }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Docker Build"
            echo "| Check | Result |"
            echo "|-------|--------|"
            if [ "$BUILD_OUTCOME" = "success" ]; then
              echo "| Build & Push | ✅ Success |"
            else
              echo "| Build & Push | ❌ Failed |"
            fi
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "$IMAGE_TAGS"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
