services:
  mcp-hub:
    image: ghcr.io/solidlime/mcp-hub:latest
    restart: unless-stopped
    ports:
      - "26263:26263"
    environment:
      - MCP_HUB_DATA_DIR=/data
      - PUID=1000
      - PGID=1000
    volumes:
      - /volume1/docker/mcp-hub/data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26263/admin/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
